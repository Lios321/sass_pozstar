name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test -- --ci

      - name: Build
        env:
          # Provide minimal env for Next build; override in repo secrets if needed
          NEXTAUTH_SECRET: dummy
          NEXTAUTH_URL: http://localhost:3000
          JWT_SECRET: dummy
          DATABASE_URL: file:./prisma/dev.db
        run: npm run build

